<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 360px;
        min-height: 200px;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .header {
        padding: 16px 20px;
        background: linear-gradient(135deg, #141414, #1a1a1a);
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #c6a55c, #d4b96e);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header-icon svg {
        width: 18px;
        height: 18px;
        color: #0a0a0a;
      }
      .header-text h1 {
        font-size: 14px;
        font-weight: 700;
        color: #c6a55c;
      }
      .header-text p {
        font-size: 10px;
        color: #666;
        margin-top: 2px;
      }
      .body {
        padding: 16px;
        max-height: 350px;
        overflow-y: auto;
      }
      .empty {
        text-align: center;
        padding: 30px 16px;
        color: #555;
        font-size: 13px;
        line-height: 1.6;
      }
      .empty .icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .link-item {
        background: #141414;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .link-item:hover {
        border-color: #c6a55c;
      }
      .link-label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .link-url {
        font-size: 9px;
        color: #555;
        font-family: monospace;
        word-break: break-all;
        margin-bottom: 8px;
      }
      .link-actions {
        display: flex;
        gap: 6px;
      }
      .btn {
        flex: 1;
        padding: 7px 10px;
        border: none;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-copy {
        background: #222;
        color: #f5f5f5;
      }
      .btn-copy:hover {
        background: #333;
      }
      .btn-send {
        background: linear-gradient(135deg, #c6a55c, #a8893e);
        color: #0a0a0a;
      }
      .btn-send:hover {
        background: linear-gradient(135deg, #d4b96e, #c6a55c);
      }
      .footer {
        padding: 10px 20px;
        border-top: 1px solid #222;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .footer-text {
        font-size: 9px;
        color: #444;
      }
      .btn-clear {
        background: none;
        border: 1px solid #333;
        color: #888;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 10px;
        cursor: pointer;
      }
      .btn-clear:hover {
        border-color: #e53935;
        color: #e53935;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
      </div>
      <div class="header-text">
        <h1>StreamVault Link Grabber</h1>
        <p>Détection automatique des liens .m3u8</p>
      </div>
    </div>

    <div class="body" id="links-container">
      <div class="empty">
        <div class="icon">📡</div>
        Aucun lien détecté pour l'instant.<br />
        <small>Ouvre cinepulse.lol et lance une vidéo !</small>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">StreamVault Extension v1.1</span>
      <div style="display: flex; gap: 6px;">
        <button class="btn-clear" id="btn-copy-all" style="color: #c6a55c; border-color: #c6a55c;">📋 Copier TOUT (Masse)</button>
        <button class="btn-clear" id="btn-clear">🗑️ Effacer</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
