<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C6A55C">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon-192.png" sizes="192x192">
    <title>Mes Téléchargements — Hors Ligne</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --deep-black: #050505;
            --surface: #111111;
            --surface-light: #1A1A1A;
            --gold: #C6A55C;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --gold-hover: #b39149;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--deep-black); color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
        }
        header {
            padding: 30px 40px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--surface-light); background: rgba(0,0,0,0.8);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        h1 { margin: 0; font-size: 1.8rem; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--surface-light); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { transform: scale(1.02); border-color: rgba(198,165,92,0.5); }
        .poster { width: 100%; aspect-ratio: 16/9; background: var(--surface-light); object-fit: cover; position: relative; }
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .card:hover .play-overlay { opacity: 1; }
        .play-btn {
            width: 50px; height: 50px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: black;
            box-shadow: 0 0 20px rgba(198,165,92,0.6);
        }
        .info { padding: 15px; flex: 1; }
        .title { margin: 0 0 5px 0; font-size: 1.1rem; }
        .subtitle { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }
        .empty { text-align: center; padding: 100px 20px; color: var(--text-secondary); }

        /* Custom Player Overlay */
        #player-modal {
            position: fixed; inset: 0; background: #000; z-index: 1000; display: none;
            flex-direction: column; overflow: hidden;
        }
        #player-modal.active { display: flex; }
        .video-container {
            position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        video {
            width: 100%; height: 100%; object-fit: contain; outline: none;
        }
        .controls-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%);
            opacity: 1; transition: opacity 0.3s; z-index: 10; pointer-events: none;
        }
        .controls-overlay.hidden { opacity: 0; pointer-events: none; cursor: none; }
        .video-container.active-controls { cursor: default; }
        .video-container.hidden-controls { cursor: none; }
        
        /* Top Bar */
        .top-bar {
            padding: 30px; display: flex; align-items: center; gap: 20px; pointer-events: auto;
        }
        .back-btn {
            background: transparent; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--gold); }
        .movie-title { margin: 0; font-size: 1.5rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Bottom Bar */
        .bottom-bar {
            padding: 20px 30px 30px 30px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .timeline-container {
            width: 100%; display: flex; align-items: center; gap: 15px;
        }
        .time { font-size: 0.9rem; color: #ddd; font-variant-numeric: tabular-nums; width: 60px; text-align: center; }
        
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%; background: var(--gold); cursor: pointer; transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .controls-row {
            display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
        }
        .controls-left, .controls-right {
            display: flex; align-items: center; gap: 20px;
        }
        .icon-btn {
            background: transparent; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s, transform 0.1s;
        }
        .icon-btn:hover { color: var(--gold); }
        .icon-btn:active { transform: scale(0.9); }
        
        .volume-container { display: flex; align-items: center; gap: 10px; }
        .volume-slider { width: 80px; }

        .spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 4px solid rgba(198,165,92,0.3); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .video-container.buffering .spinner { display: block; }
    </style>
</head>
<body>

    <header>
        <svg style="color:var(--gold)" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m8 17 4 4 4-4"></path></svg>
        <h1>Mode Voyage (Hors Ligne)</h1>
        
        <button onclick="goOnline()" class="btn" style="margin-left: auto; background: var(--surface-light); color: var(--text-primary); border: 1px solid var(--surface-hover); padding: 8px 16px; font-size: 1rem; box-shadow: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            Retourner sur le site
        </button>
    </header>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">
        <h2>Aucun téléchargement</h2>
        <p>Téléchargez des films ou épisodes lorsque vous êtes en ligne pour les retrouver ici.</p>
    </div>

    <!-- Custom Player Modal -->
    <div id="player-modal">
        <div class="video-container" id="video-container">
            <video id="video" playsinline></video>
            <div class="spinner"></div>

            <div class="controls-overlay" id="controls-overlay">
                <!-- Top -->
                <div class="top-bar">
                    <button class="back-btn" onclick="closePlayer()" title="Retour">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <h2 id="now-playing-title" class="movie-title">...</h2>
                </div>

                <!-- Bottom -->
                <div class="bottom-bar">
                    <div class="timeline-container">
                        <span class="time" id="current-time">0:00</span>
                        <input type="range" id="seek-bar" value="0" min="0" step="1">
                        <span class="time" id="duration">0:00</span>
                    </div>

                    <div class="controls-row">
                        <div class="controls-left">
                            <button class="icon-btn" id="play-pause-btn" style="width: 40px; height: 40px;">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path id="play-icon" d="M5 3l14 9-14 9V3z"/></svg>
                            </button>
                            <button class="icon-btn" id="rewind-btn" title="Reculer 10s">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/></svg>
                            </button>
                            <button class="icon-btn" id="forward-btn" title="Avancer 10s">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5"/><path d="M6 17l5-5-5-5"/></svg>
                            </button>
                            <div class="volume-container">
                                <button class="icon-btn" id="mute-btn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="vol-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                </button>
                                <input type="range" id="volume-bar" class="volume-slider" value="1" min="0" max="1" step="0.1">
                            </div>
                        </div>

                        <div class="controls-right">
                            <button class="icon-btn" id="fullscreen-btn" title="Plein écran">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="fs-icon"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let hlsInstance = null;

        // Custom Player Logic
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('video-container');
        const overlay = document.getElementById('controls-overlay');
        const playBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const muteBtn = document.getElementById('mute-btn');
        const volIcon = document.getElementById('vol-icon');
        const volumeBar = document.getElementById('volume-bar');
        const fsBtn = document.getElementById('fullscreen-btn');
        const fsIcon = document.getElementById('fs-icon');

        let hideTimer;

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = Math.floor(sec % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function showControls() {
            overlay.classList.remove('hidden');
            videoContainer.classList.remove('hidden-controls');
            videoContainer.classList.add('active-controls');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => {
                if (!video.paused) {
                    overlay.classList.add('hidden');
                    videoContainer.classList.remove('active-controls');
                    videoContainer.classList.add('hidden-controls');
                }
            }, 3000);
        }

        videoContainer.addEventListener('mousemove', showControls);
        videoContainer.addEventListener('click', showControls);

        function togglePlay() {
            if (video.paused) video.play();
            else video.pause();
        }
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        video.addEventListener('play', () => {
            playIcon.setAttribute('d', 'M6 4h4v16H6zm8 0h4v16h-4z'); // Pause Icon
            showControls();
        });
        video.addEventListener('pause', () => {
            playIcon.setAttribute('d', 'M5 3l14 9-14 9V3z'); // Play Icon
            showControls();
        });

        video.addEventListener('timeupdate', () => {
            seekBar.value = video.currentTime;
            currentTimeEl.textContent = formatTime(video.currentTime);
            // Dynamic seek bar background
            const val = (video.currentTime / video.duration) * 100 || 0;
            seekBar.style.background = `linear-gradient(to right, var(--gold) ${val}%, rgba(255,255,255,0.2) ${val}%)`;
        });
        video.addEventListener('loadedmetadata', () => {
            seekBar.max = video.duration;
            durationEl.textContent = formatTime(video.duration);
        });

        seekBar.addEventListener('input', (e) => {
            video.currentTime = e.target.value;
        });

        document.getElementById('rewind-btn').addEventListener('click', () => video.currentTime -= 10);
        document.getElementById('forward-btn').addEventListener('click', () => video.currentTime += 10);

        function updateVolume(val) {
            video.volume = val;
            video.muted = (val === 0);
            volumeBar.value = val;
            volumeBar.style.background = `linear-gradient(to right, white ${val*100}%, rgba(255,255,255,0.2) ${val*100}%)`;
            if (val === 0) volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
            else if (val < 0.5) volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
            else volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
        }
        volumeBar.addEventListener('input', (e) => updateVolume(parseFloat(e.target.value)));
        muteBtn.addEventListener('click', () => {
            if (video.volume > 0) { video.dataset.vol = video.volume; updateVolume(0); }
            else updateVolume(parseFloat(video.dataset.vol) || 1);
        });

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(err => console.log(err));
                fsIcon.innerHTML = `<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>`;
            } else {
                document.exitFullscreen();
                fsIcon.innerHTML = `<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>`;
            }
        });

        video.addEventListener('waiting', () => videoContainer.classList.add('buffering'));
        video.addEventListener('playing', () => videoContainer.classList.remove('buffering'));

        // DB Data load
        function loadDownloads() {
            const req = indexedDB.open("streamvault-downloads", 1);
            req.onsuccess = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("media")) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }
                const tx = db.transaction("media", "readonly");
                const store = tx.objectStore("media");
                const reqAll = store.getAll();
                reqAll.onsuccess = () => {
                    const data = reqAll.result;
                    if (!data || data.length === 0) {
                        document.getElementById('empty').style.display = 'block';
                        return;
                    }
                    data.sort((a,b) => new Date(b.downloadedAt) - new Date(a.downloadedAt));
                    
                    const grid = document.getElementById('grid');
                    grid.innerHTML = '';
                    
                    data.forEach(media => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => playMedia(media);
                        card.innerHTML = `
                            <div class="poster-container" style="position:relative">
                                <img src="${media.posterUrl || ''}" class="poster" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMxQTFBMUEiLz48L3N2Zz4='">
                                <div class="play-overlay">
                                    <div class="play-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg></div>
                                </div>
                            </div>
                            <div class="info">
                                <h3 class="title">${media.title}</h3>
                                <p class="subtitle">${media.type === 'Series' ? 'Saison ' + media.seasonNum + ' • Épisode ' + media.episodeNum : 'Film'} | ${new Date(media.downloadedAt).toLocaleDateString()}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                };
            };
        }

        function playMedia(media) {
            const modal = document.getElementById('player-modal');
            document.getElementById('now-playing-title').innerText = media.title;
            modal.classList.add('active');
            updateVolume(1); // Reset volume

            if (Hls.isSupported()) {
                if (hlsInstance) { hlsInstance.destroy(); }
                hlsInstance = new Hls({
                    maxBufferLength: 30,
                    startLevel: -1
                });
                hlsInstance.loadSource(media.streamUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.warn("Auto-play blocked", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = media.streamUrl;
                video.play();
            }
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.remove('active');
            video.pause();
            video.src = "";
            video.removeAttribute('src'); // empty source
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(e => console.log(e));
            }
        }

        // Initialize
        loadDownloads();

        function goOnline() {
            if (navigator.onLine) {
                window.location.href = "/";
            } else {
                alert("Vous êtes toujours hors-ligne ! Connectez-vous d'abord à Internet.");
            }
        }
    </script>
</body>
</html>
